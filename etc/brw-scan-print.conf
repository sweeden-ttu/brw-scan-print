# Brother MFC-L2750DW Application Configuration
# Configuration file for brw-scan-print GNOME application

[device]
# Device network configuration
ip_address = 192.168.0.23
model = MFC-L2750DW
firmware = ZE 1.13
node_name = BRW3-C9ABF72124

# Connection settings
protocol = ipp
port = 631
timeout = 30

[scanning]
# Default scanning options
default_dpi = 300
default_format = PDF
default_source = flatbed
default_quality = normal

# Supported sources
sources = flatbed, adf, adf-duplex

# Supported DPI values
dpi_values = 150, 300, 600

# Supported formats
formats = PDF, JPEG, PNG, TIFF

# Output settings
output_directory = ~/Documents/Scans
output_prefix = scan_
output_format = PDF

[printing]
# Default printing options
default_copies = 1
default_quality = normal
default_paper = letter
default_sides = one-sided

# Supported paper sizes
paper_sizes = letter, legal, a4, executive

# Supported paper sources
paper_sources = auto, tray1, tray2, manual, mpf

# Print quality options
qualities = draft, normal, high

# Output settings
output_directory = ~/Downloads

[paths]
# Application paths
scan_output = ~/Documents/Scans
log_file = ~/.local/share/brw-scan-print/log.txt
config_file = ~/.config/brw-scan-print/brw-scan-print.conf
cache_directory = ~/.cache/brw-scan-print

[ui]
# GTK application settings
window_width = 800
window_height = 600
theme = system

# Preview settings
preview_dpi = 150
preview_size = 400x300

[logging]
# Logging configuration
level = INFO
file_enabled = true
console_enabled = true

[advanced]
# Advanced settings
use_sane_thread = true
cups_debug = false
sane_debug = false
